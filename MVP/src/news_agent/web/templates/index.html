<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>News Agent</h1>
            <p class="subtitle">AI 新闻助手管理面板</p>
        </header>

        <main>
            <div class="top-row">
                <section class="card status-control-card">
                    <h2>爬虫状态</h2>
                    <div class="status-control-row">
                        <div class="status-display">
                            <span class="status-dot" id="schedulerStatusIndicator"></span>
                            <span class="status-text" id="schedulerStatusText">检查中...</span>
                        </div>
                        <div class="toggle-container">
                            <label class="toggle-switch">
                                <input type="checkbox" id="schedulerToggleSwitch">
                                <span class="slider"></span>
                            </label>
                            <span class="toggle-label" id="schedulerToggleLabel">启动爬虫</span>
                        </div>
                    </div>
                </section>

                <section class="card action-card">
                    <h2>快捷操作</h2>
                    <button id="fetchNewsBtn" class="btn primary">立即获取新闻</button>
                </section>
            </div>

            <section class="card config-card">
                <h2>配置</h2>
                <div class="config-grid">
                    <div class="config-item">
                        <label for="cronTimes">定时时间</label>
                        <input type="text" id="cronTimes" placeholder="08:30, 11:30, 17:30">
                    </div>
                    <div class="config-item">
                        <label for="emailRecipients">收件人</label>
                        <input type="text" id="emailRecipients" placeholder="a@example.com">
                    </div>
                    <div class="config-item checkbox-item">
                        <label for="emailEnabled">启用邮件通知</label>
                        <div class="checkbox-container">
                            <input type="checkbox" id="emailEnabled">
                            <span class="checkbox-custom"></span>
                        </div>
                    </div>
                </div>
                <div class="config-buttons">
                    <button id="loadConfigBtn" class="btn outline">加载配置</button>
                    <button id="saveConfigBtn" class="btn primary">保存配置</button>
                </div>
                <div id="configMessage" class="config-message"></div>
            </section>
        </main>

        <footer>
            <p>News Agent &middot; Flask</p>
        </footer>
    </div>

    <script>
        const schedulerStatusIndicator = document.getElementById('schedulerStatusIndicator');
        const schedulerStatusText = document.getElementById('schedulerStatusText');
        const schedulerToggleSwitch = document.getElementById('schedulerToggleSwitch');
        const schedulerToggleLabel = document.getElementById('schedulerToggleLabel');

        const cronTimes = document.getElementById('cronTimes');
        const emailRecipients = document.getElementById('emailRecipients');
        const emailEnabled = document.getElementById('emailEnabled');
        const loadConfigBtn = document.getElementById('loadConfigBtn');
        const saveConfigBtn = document.getElementById('saveConfigBtn');
        const configMessage = document.getElementById('configMessage');
        let configSaveStatusInterval = null;

        let currentSchedulerStatus = { running: false };
        let isUpdatingSchedulerToggle = false;

        function updateSchedulerStatus(status) {
            currentSchedulerStatus = status;
            if (status.running) {
                schedulerStatusIndicator.className = 'status-dot online';
                schedulerStatusText.textContent = '运行中';
            } else {
                schedulerStatusIndicator.className = 'status-dot offline';
                schedulerStatusText.textContent = '已停止';
            }
            isUpdatingSchedulerToggle = true;
            schedulerToggleSwitch.checked = status.running;
            schedulerToggleLabel.textContent = status.running ? '停止爬虫' : '启动爬虫';
            isUpdatingSchedulerToggle = false;
        }

        async function fetchSchedulerStatus() {
            try {
                const response = await fetch('/api/scheduler/status');
                const data = await response.json();
                updateSchedulerStatus(data);
            } catch (error) {
                console.error('Failed to fetch scheduler status:', error);
            }
        }

        async function startScheduler() {
            try {
                const response = await fetch('/api/scheduler/start', { method: 'POST' });
                const data = await response.json();
                updateSchedulerStatus(data);
            } catch (error) {
                console.error('Failed to start scheduler:', error);
                fetchSchedulerStatus();
            }
        }

        async function stopScheduler() {
            try {
                const response = await fetch('/api/scheduler/stop', { method: 'POST' });
                const data = await response.json();
                updateSchedulerStatus(data);
            } catch (error) {
                console.error('Failed to stop scheduler:', error);
                fetchSchedulerStatus();
            }
        }

        schedulerToggleSwitch.addEventListener('change', () => {
            if (isUpdatingSchedulerToggle) return;
            if (schedulerToggleSwitch.checked) {
                startScheduler();
            } else {
                stopScheduler();
            }
        });

        function showConfigMessage(message, isError = false) {
            configMessage.textContent = message;
            configMessage.className = 'config-message ' + (isError ? 'error' : 'success');
            setTimeout(() => {
                configMessage.textContent = '';
                configMessage.className = 'config-message';
            }, 3000);
        }

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                if (data.error) {
                    showConfigMessage('加载失败: ' + data.error, true);
                    return;
                }
                cronTimes.value = data.cron_times || '';
                emailRecipients.value = data.email_recipients || '';
                emailEnabled.checked = data.email_enabled;
            } catch (error) {
                console.error('Failed to load config:', error);
                showConfigMessage('加载失败', true);
            }
        }

        async function saveConfig() {
            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cron_times: cronTimes.value,
                        email_recipients: emailRecipients.value,
                        email_enabled: emailEnabled.checked
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showConfigMessage('正在保存...');
                    saveConfigBtn.disabled = true;
                    saveConfigBtn.textContent = '保存中...';
                    configSaveStatusInterval = setInterval(checkConfigSaveStatus, 1000);
                } else {
                    showConfigMessage(data.message || '保存失败', true);
                }
            } catch (error) {
                console.error('Failed to save config:', error);
                showConfigMessage('保存失败', true);
            }
        }

        async function checkConfigSaveStatus() {
            try {
                const response = await fetch('/api/config-save-status');
                const data = await response.json();
                if (!data.running) {
                    clearInterval(configSaveStatusInterval);
                    configSaveStatusInterval = null;
                    saveConfigBtn.disabled = false;
                    saveConfigBtn.textContent = '保存配置';
                    if (data.last_result) {
                        if (data.last_result.success) {
                            showConfigMessage('配置已保存');
                        } else {
                            showConfigMessage('保存失败', true);
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to check config save status:', error);
            }
        }

        loadConfigBtn.addEventListener('click', loadConfig);
        saveConfigBtn.addEventListener('click', saveConfig);

        const fetchNewsBtn = document.getElementById('fetchNewsBtn');
        let fetchStatusInterval = null;

        async function fetchNews() {
            try {
                const response = await fetch('/api/fetch-news', { method: 'POST' });
                const data = await response.json();
                if (data.success) {
                    showConfigMessage('正在获取新闻...');
                    fetchNewsBtn.disabled = true;
                    fetchNewsBtn.textContent = '获取中...';
                    fetchStatusInterval = setInterval(checkFetchStatus, 1000);
                } else {
                    showConfigMessage(data.message || '获取失败', true);
                }
            } catch (error) {
                console.error('Failed to fetch news:', error);
                showConfigMessage('获取失败', true);
            }
        }

        async function checkFetchStatus() {
            try {
                const response = await fetch('/api/fetch-status');
                const data = await response.json();
                if (!data.running) {
                    clearInterval(fetchStatusInterval);
                    fetchStatusInterval = null;
                    fetchNewsBtn.disabled = false;
                    fetchNewsBtn.textContent = '立即获取新闻';
                    if (data.last_result) {
                        if (data.last_result.success) {
                            showConfigMessage('新闻获取完成');
                        } else {
                            showConfigMessage('获取失败', true);
                        }
                    }
                }
            } catch (error) {
                console.error('Failed to check fetch status:', error);
            }
        }

        fetchNewsBtn.addEventListener('click', fetchNews);

        fetchSchedulerStatus();
        loadConfig();
        setInterval(fetchSchedulerStatus, 5000);
    </script>
</body>
</html>
